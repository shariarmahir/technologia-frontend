<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B1464"/>
      <stop offset="50%" stop-color="#2E21A3"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Icon mark -->
  <rect width="36" height="36" x="2" y="2" rx="9" fill="url(#iconGrad)"/>
  <rect width="36" height="36" x="2" y="2" rx="9" fill="url(#shine)"/>
  <!-- Center node -->
  <circle cx="20" cy="20" r="3.2" fill="white"/>
  <!-- Corner nodes -->
  <circle cx="9"  cy="12" r="2" fill="rgba(125,211,252,0.85)"/>
  <circle cx="31" cy="12" r="2" fill="rgba(125,211,252,0.85)"/>
  <circle cx="9"  cy="28" r="2" fill="rgba(125,211,252,0.85)"/>
  <circle cx="31" cy="28" r="2" fill="rgba(125,211,252,0.85)"/>
  <!-- Connection lines -->
  <line x1="10.8" y1="12.9" x2="17.1" y2="17.8" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="29.2" y1="12.9" x2="22.9" y2="17.8" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10.8" y1="27.1" x2="17.1" y2="22.2" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="29.2" y1="27.1" x2="22.9" y2="22.2" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="46" y="26" font-family="'Plus Jakarta Sans', ui-sans-serif, sans-serif" font-size="17" font-weight="600" fill="#0F0B3D" letter-spacing="-0.4">techno</text>
  <text x="101" y="26" font-family="'Plus Jakarta Sans', ui-sans-serif, sans-serif" font-size="17" font-weight="700" fill="#0EA5E9" letter-spacing="-0.4">LO</text>
  <text x="120" y="26" font-family="'Plus Jakarta Sans', ui-sans-serif, sans-serif" font-size="17" font-weight="600" fill="#0F0B3D" letter-spacing="-0.4">gia.</text>
